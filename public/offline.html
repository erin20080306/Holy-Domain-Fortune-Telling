<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MYSTIC - 離線模式</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #050508;
        color: #e8e2d6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC",
          "Microsoft JhengHei", sans-serif;
        padding: max(24px, env(safe-area-inset-top)) 24px
          max(24px, env(safe-area-inset-bottom));
      }
      .card {
        max-width: 420px;
        width: 100%;
        text-align: center;
        padding: 40px 28px;
        border: 1px solid rgba(168, 152, 130, 0.35);
        border-radius: 28px;
        background: rgba(20, 18, 26, 0.6);
      }
      .mark {
        font-size: 44px;
        font-weight: 700;
        letter-spacing: 4px;
        color: #a89882;
        margin-bottom: 20px;
      }
      h1 { font-size: 22px; margin: 0 0 14px; color: #f2ecdf; }
      p { font-size: 16px; line-height: 1.7; color: #b7b0a3; margin: 0 0 28px; }
      button {
        font-size: 16px;
        padding: 14px 28px;
        border-radius: 999px;
        border: 1px solid #a89882;
        background: linear-gradient(180deg, #b7a488, #8f7f68);
        color: #050508;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark">MYSTIC</div>
      <h1>目前沒有網路連線</h1>
      <p>
        你仍可瀏覽部分本地內容。登入、付款、深度分析與資料同步需要恢復網路後使用。
      </p>
      <button onclick="location.reload()">重新連線</button>
    </div>
  </body>
</html>
