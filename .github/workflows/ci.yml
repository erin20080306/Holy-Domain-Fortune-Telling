name: CI

on:
  push:
    branches: ['**']
  pull_request:

# CI never calls real PayPal / AI / FreeAstro APIs. No production secrets needed.
# Runtime code checks for secrets at request time, so build must not require them.
env:
  CI: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check:secrets
      - run: npm run check:client-env
